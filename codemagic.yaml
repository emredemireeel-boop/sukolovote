workflows:
  android-workflow:
    name: Şüko YÖKDİL Android APK Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      flutter: default
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  ios-workflow:
    name: Şüko YÖKDİL iOS TestFlight Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.sukolovote.yokdilSaglik"
      flutter: default
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Prepare certificate private key
        script: |
          set -e
          rm -f /tmp/cert_key.pem
          if printf '%s' "$CERTIFICATE_PRIVATE_KEY" | grep -q "BEGIN"; then
            printf '%s' "$CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key.pem
          else
            printf '%s' "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/cert_key.pem 2>/dev/null || true
          fi
          if ! grep -q "BEGIN" /tmp/cert_key.pem 2>/dev/null; then
            echo "Gecerli sertifika anahtari yok, yeni bir tane uretiliyor..."
            rm -f /tmp/cert_key.pem
            ssh-keygen -t rsa -b 2048 -m PEM -f /tmp/cert_key.pem -q -N ""
          fi
          echo "Sertifika anahtari hazir."
      - name: Fetch/create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build iOS IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
