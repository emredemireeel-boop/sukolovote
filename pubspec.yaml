name: yokdil_saglik
description: YÖKDİL Sağlık Bilimleri Çalışma Rehberi - Premium iOS Uygulaması
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.2
  http: ^1.2.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/logo.png"
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: "assets/logo.png"
